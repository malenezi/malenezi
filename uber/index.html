/* الهندسة: سداسي حول المركز — مشترك بين SVG والنسب المئوية */
const VBW = 1000, VBH = 820, CX = 500, CY = 400, RX = 372, RY = 300;
const ANGLES = [-90, -30, 30, 90, 150, 210];
const positioned = NODES.map((n, i) => {
  const a = (ANGLES[i] * Math.PI) / 180;
  const sx = CX + RX * Math.cos(a);
  const sy = CY + RY * Math.sin(a);
  return { ...n, sx, sy, leftPct: (sx / VBW) * 100, topPct: (sy / VBH) * 100 };
});

};

  return (
    <AnimatePresence>

        <>

                    <Icon name={isCenter ? "hub" : node.icon} className="w-7 h-7" />
                  </span>
                  <div>
                    <p className="text-[11px] font-semibold" style={{ color }}>
                      {isCenter ? "المنسّق الوطني" : node.tag}
                    </p>
                    <h3 className="font-display font-bold text-navy text-lg leading-tight">
                      {isCenter ? CENTER.title : node.title}

                  </div>
                </div>
                <button onClick={onClose} aria-label="إغلاق"
                  className="shrink-0 grid place-items-center w-9 h-9 rounded-full border border-hair text-slate2 hover:bg-mist transition">✕</button>

              {isCenter ? (
                <div className="mt-7 space-y-7">
                  <p className="text-slate2 leading-relaxed">

                      ربط العرض بالطلب في سوق العمل، وقياس الأثر الوطني على مستوى المنظومة بأكملها.
                    </p>
                  </div>

                <div className="mt-7 space-y-6">
                  <div>
                    <p className="text-[11px] font-semibold text-slate2/80 mb-1.5">الغرض</p>

          style={{ background: "linear-gradient(135deg,#16578d 0%,#1f6fb2 45%,#14a08a 120%)" }}>
          <div className="absolute inset-0 opacity-20"
            style={{ backgroundImage: "radial-gradient(circle at 20% 20%, #fff 1px, transparent 1px)", backgroundSize: "26px 26px" }} />
          <div className="relative p-8 sm:p-14 text-center">
            <span className="inline-flex items-center gap-2 rounded-full bg-white/15 text-white/90 px-4 py-1.5 text-xs font-semibold tracking-wide">
              <Icon name="hub" className="w-4 h-4" /> نموذج المنسّق
            </span>
            <p className="mt-6 text-white font-display font-semibold text-xl sm:text-3xl leading-relaxed max-w-4xl mx-auto">
              تعمل أكاديمية سدايا بوصفها المنسّق الوطني لتطوير القدرات في الذكاء الاصطناعي — تربط
              احتياجات سوق العمل، والمتدربين، وجهات التدريب، وجهات الاعتماد، وذكاء المهارات في منظومة
              واحدة متكاملة تحقّق مخرجات قوى عاملة عالية الجودة وقابلة للقياس.
            </p>
          </div>
        </div>
      </Reveal>

      <div className="mt-10 grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[
          { k: "١", l: "منسّق وطني", ic: "hub" },
          { k: "٦", l: "شركاء منظومة مترابطون", ic: "users" },
          { k: "٣٦٠°", l: "حلقة تغذية راجعة مبنية على الأدلة", ic: "flow" },
          { k: "٧", l: "مراحل تشغيلية معتمدة وقابلة للقياس", ic: "refresh" },
        ].map((s, i) => (
          <Reveal key={i} delay={i * 0.08}>
            <div className="h-full rounded-2xl bg-white border border-hair shadow-soft p-5 text-center">
              <span className="grid place-items-center w-10 h-10 mx-auto rounded-xl bg-brand/10 text-brand mb-3">
                <Icon name={s.ic} className="w-6 h-6" />
              </span>
              <p className="font-display font-extrabold text-navy text-2xl sm:text-3xl">{s.k}</p>
              <p className="mt-1 text-xs text-slate2 leading-snug">{s.l}</p>

          </Reveal>
        ))}
      </div>
    </div>
  </section>
);

const Footer = () => (
  <footer className="border-t border-hair py-10">
    <div className="max-w-7xl mx-auto px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <img src="assets/academy-full.png" alt="أكاديمية سدايا" className="h-8 w-auto" />
      <p className="text-xs text-slate2/70 text-center">المنسّق الوطني لمنظومة تطوير القدرات في الذكاء الاصطناعي</p>
    </div>
  </footer>
);

/* ------------------------------------------------------------------ */
const App = () => {
  const [selected, setSelected] = useState(null);
  useEffect(() => {
    document.body.style.overflow = selected ? "hidden" : "";
  }, [selected]);
  return (
    <div className="relative">
      <Nav />
      <main>
        <Hero />
        <NetworkSection onSelect={setSelected} />
        <FlowSection />
        <KeyMessage />
      </main>
      <Footer />
      <SidePanel selected={selected} onClose={() => setSelected(null)} />
    </div>
  );
};

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
